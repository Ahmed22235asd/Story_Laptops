<!DOCTYPE html>
<html>
    <head>
<title>Sign Up</title>
<link rel="stylesheet" href="style.css" />
    </head>
    <body>
<div id="Signup-Page">
<h2>SignUp</h2>
<form id="Signup-Form">
<div class="form-group">
<label for="Name">Name</label>
<input type="text" id="Name" placeholder="Name" required/>
</div>
<div class="form-group">
<label for="email">Email</label>
<input type="email" id="email" placeholder="Email" required/>
</div>
<div class="form-group">
<label for="password">Password</label>
<input type="password" id="password" placeholder="Password" required/>
</div>
<div class="form-group">
<label for="phone">Phone Number</label>
<div class="phone-wrapper">
  <select id="country-code">
    <option value="+20" data-code="20">EG +20</option>
    <option value="+966" data-code="966">SA +966</option>
    <option value="+971" data-code="971">AE +971</option>
    <option value="+1" data-code="1">US +1</option>
  </select>
  <input type="tel" inputmode="numeric" id="phone" placeholder="01xxxxxxxxx" maxlength="15" required/>
</div>
</div>
<button id="button" type="submit">SignUp</button>
</form>
<div id="message"></div>
<button id="LoginGo">Go To Log in Page</button>
</div>
    </body>
    <script src="register.js"></script>
</html>
